<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Ceprocenter · Calificar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #EEF0F5; --panel: #FFFFFF; --panel-2: #F5F6FA; --line: #DEE2EA;
    --accent: #A5D32A; --accent-soft: rgba(165,211,42,0.15); --accent-dark: #8AB122;
    --text: #24273A; --text-dim: #767C93; --danger: #D9614F; --radius: 12px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;-webkit-font-smoothing:antialiased;}
  h1,h2{font-family:'Quicksand',sans-serif;letter-spacing:0.01em;}
  .wrap{max-width:600px;margin:0 auto;padding:32px 20px 60px;}
  .top{text-align:center;margin-bottom:26px;}
  .top h1{font-size:24px;font-weight:700;margin:0;color:var(--text);}
  .top .sub{color:var(--text-dim);font-size:14px;margin-top:8px;line-height:1.5;}
  .accent{color:var(--accent-dark);}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:24px;box-shadow:0 1px 2px rgba(36,39,58,0.04);margin-bottom:16px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-dim);margin-bottom:6px;}
  .field .req{color:var(--danger);}
  .field input, .field select, .field textarea{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:12px;color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;}
  .field input:focus, .field select:focus, .field textarea:focus{outline:none;border-color:var(--accent-dark);}
  .field textarea{min-height:70px;}
  .btn{width:100%;font-family:'Quicksand',sans-serif;font-size:16px;font-weight:700;border-radius:10px;padding:14px;border:none;cursor:pointer;background:var(--accent);color:#1A2E0A;margin-top:8px;}
  .btn:hover{background:var(--accent-dark);color:#fff;}
  .btn:disabled{opacity:0.6;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;padding:12px 20px;border-radius:9px;font-size:13.5px;opacity:0;transition:all 0.25s ease;pointer-events:none;z-index:100;max-width:88%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .setup-hint{background:var(--accent-soft);border:1px solid var(--accent);border-radius:var(--radius);padding:16px 18px;margin-bottom:20px;font-size:13px;color:var(--text-dim);}
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <h1>Registro de Calificaciones <span class="accent">Ceprocenter</span></h1>
  </div>

  <div class="panel" id="fijos_box">
    <div class="field"><label>Tu Nombre (Tutor / Facilitador) <span class="req">*</span></label><input id="f_tutor" list="tutores_dl" placeholder="Nombre completo, tal como te registraron"><datalist id="tutores_dl"></datalist></div>
    <button class="btn" id="btn_identificarme">Ver mis cursos asignados</button>
  </div>

  <div class="panel" id="sin_asignacion_box" style="display:none;">
    <p style="color:var(--danger);font-size:14px;margin:0;">No encontramos cursos asignados a ese nombre. Verifica que lo hayas escrito igual que te registró la administración, o contáctalos para que te asignen un curso.</p>
  </div>

  <div class="panel" id="curso_modulo_box" style="display:none;">
    <div class="field"><label>Curso <span class="req">*</span></label><select id="f_curso"><option value="">Selecciona un curso</option></select></div>
    <div class="field"><label>Módulo / Evaluación <span class="req">*</span></label><select id="f_modulo"><option value="">Selecciona un curso primero</option></select></div>
  </div>

  <div class="panel" id="contexto_box" style="display:none;background:var(--accent-soft);border:2px solid var(--accent);">
    <div style="font-size:12px;text-transform:uppercase;letter-spacing:0.05em;color:var(--accent-dark);font-weight:700;margin-bottom:6px;">Calificando ahora</div>
    <div id="contexto_curso" style="font-family:'Quicksand',sans-serif;font-weight:700;font-size:16px;line-height:1.4;color:var(--text);"></div>
    <div id="contexto_modulo" style="font-family:'Quicksand',sans-serif;font-weight:600;font-size:14px;color:var(--text);line-height:1.4;margin-top:2px;"></div>
  </div>

  <div class="panel" id="form_box" style="display:none;">
    <div class="field"><label>Estudiante <span class="req">*</span></label><select id="f_estudiante"><option value="">Selecciona un curso primero</option></select></div>
    <div class="field"><label>Tipo</label>
      <select id="f_tipo">
        <option>Regular</option>
        <option>Recuperativa</option>
      </select>
    </div>
    <div class="field"><label id="lbl_f_nota">Nota (sobre 10) <span class="req">*</span></label><input id="f_nota" type="number" step="0.1" min="0" max="10" placeholder="0.0"></div>
    <div class="field"><label>Retroalimentación <span class="req">*</span></label><textarea id="f_retro" placeholder="Comentario sobre el desempeño del estudiante en esta evaluación..."></textarea></div>
    <div class="field"><label>Archivo Adjunto (opcional)</label><input id="f_archivo" type="file" accept="image/*,.pdf,.doc,.docx"></div>
    <button class="btn" id="btn_guardar">Guardar Calificación</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// Reemplaza esta URL una sola vez con la de tu Apps Script Académico (la misma de Calificaciones y Matrículas).
const API_URL = 'https://script.google.com/macros/s/AKfycbzSocYjhrj1F0wvNecAnGeepxsP_jie58658PL-jnQXtiVqqAT7283HpXWRs7HOWkNJ/exec';

let MODULOS = [];
let NOMINA = [];
let FACILITADORES = [];

function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3600); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

async function apiGet(sheet){
  const res = await fetch(`${API_URL}?sheet=${sheet}`);
  return await res.json();
}

function normalizarNombre(t){
  return t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim();
}

function buscarTutoresCoincidentes(tutorEscrito){
  const palabrasEscritas = normalizarNombre(tutorEscrito).split(' ').filter(Boolean);
  const tutoresUnicos = [...new Set(FACILITADORES.map(f=>f.tutor))];
  return tutoresUnicos.filter(t=>{
    const palabrasRegistradas = normalizarNombre(t).split(' ').filter(Boolean);
    return palabrasEscritas.every(pe => palabrasRegistradas.includes(pe));
  });
}

async function cargarDatos(){
  try{
    const [mod, nom, fac] = await Promise.all([apiGet('Modulos'), apiGet('Nomina'), apiGet('Facilitadores')]);
    MODULOS = mod;
    NOMINA = nom;
    FACILITADORES = fac;
    const tutores = [...new Set(fac.map(f=>f.tutor).filter(Boolean))].sort();
    document.getElementById('tutores_dl').innerHTML = tutores.map(t=>`<option value="${t}">`).join('');
  }catch(e){
    showToast('No se pudo conectar. Recarga la página.');
  }
}
cargarDatos();

function actualizarContexto(){
  const curso = document.getElementById('f_curso').value;
  const modulo = document.getElementById('f_modulo').value;
  const box = document.getElementById('contexto_box');
  if(curso && modulo){
    box.style.display = 'block';
    document.getElementById('contexto_curso').textContent = curso;
    document.getElementById('contexto_modulo').textContent = modulo;
  }else{
    box.style.display = 'none';
  }
}

let TUTOR_ACTUAL = '';

document.getElementById('btn_identificarme').addEventListener('click', ()=>{
  const tutorEscrito = document.getElementById('f_tutor').value.trim();
  if(!tutorEscrito){ showToast('Escribe tu nombre primero.'); return; }

  const coincidencias = buscarTutoresCoincidentes(tutorEscrito);

  if(coincidencias.length === 0){
    document.getElementById('sin_asignacion_box').innerHTML = '<p style="color:var(--danger);font-size:14px;margin:0;">No encontramos cursos asignados a ese nombre. Verifica que lo hayas escrito igual que te registró la administración, o contáctalos para que te asignen un curso.</p>';
    document.getElementById('sin_asignacion_box').style.display='block';
    document.getElementById('curso_modulo_box').style.display='none';
    document.getElementById('form_box').style.display='none';
    document.getElementById('contexto_box').style.display='none';
    return;
  }

  if(coincidencias.length > 1){
    document.getElementById('sin_asignacion_box').innerHTML = '<p style="color:var(--danger);font-size:14px;margin:0;">Encontramos más de un tutor que coincide con ese nombre. Por favor escribe tu nombre completo, tal como te registró la administración, para diferenciarte.</p>';
    document.getElementById('sin_asignacion_box').style.display='block';
    document.getElementById('curso_modulo_box').style.display='none';
    document.getElementById('form_box').style.display='none';
    document.getElementById('contexto_box').style.display='none';
    return;
  }

  TUTOR_ACTUAL = coincidencias[0];
  const cursosAsignados = [...new Set(FACILITADORES.filter(f=>f.tutor===TUTOR_ACTUAL).map(f=>f.curso))].sort();

  document.getElementById('sin_asignacion_box').style.display='none';
  document.getElementById('curso_modulo_box').style.display='block';
  document.getElementById('form_box').style.display='block';

  document.getElementById('f_curso').innerHTML = '<option value="">Selecciona un curso</option>' + cursosAsignados.map(c=>`<option value="${c}">${c}</option>`).join('');
  document.getElementById('f_modulo').innerHTML = '<option value="">Selecciona un curso primero</option>';
  document.getElementById('f_estudiante').innerHTML = '<option value="">Selecciona un curso primero</option>';
  actualizarContexto();
});

document.getElementById('f_curso').addEventListener('change', ()=>{
  const curso = document.getElementById('f_curso').value;

  const modulosAsignados = FACILITADORES
    .filter(f=>f.curso===curso && normalizarNombre(f.tutor)===normalizarNombre(TUTOR_ACTUAL))
    .map(f=>f.modulo);

  document.getElementById('f_modulo').innerHTML = modulosAsignados.length
    ? modulosAsignados.map(m=>`<option value="${m}">${m}</option>`).join('')
    : '<option value="">(no tienes módulos asignados en este curso)</option>';

  const estudiantes = NOMINA.filter(n=>n.curso===curso).map(n=>n.estudiante).sort();
  document.getElementById('f_estudiante').innerHTML = estudiantes.length
    ? '<option value="">Selecciona un estudiante</option>' + estudiantes.map(e=>`<option value="${e}">${e}</option>`).join('')
    : '<option value="">(sin estudiantes en la nómina)</option>';

  actualizarContexto();
});
document.getElementById('f_modulo').addEventListener('change', actualizarContexto);

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

document.getElementById('f_tipo').addEventListener('change', ()=>{
  const esRecuperativa = document.getElementById('f_tipo').value === 'Recuperativa';
  const maxNota = esRecuperativa ? 9 : 10;
  document.getElementById('f_nota').max = maxNota;
  document.getElementById('lbl_f_nota').innerHTML = `Nota (sobre ${maxNota}) <span class="req">*</span>`;
  const actual = Number(document.getElementById('f_nota').value);
  if(actual > maxNota) document.getElementById('f_nota').value = maxNota;
});

document.getElementById('btn_guardar').addEventListener('click', async ()=>{
  const tutor = document.getElementById('f_tutor').value.trim();
  const curso = document.getElementById('f_curso').value;
  const modulo = document.getElementById('f_modulo').value;
  const estudiante = document.getElementById('f_estudiante').value;
  const tipo = document.getElementById('f_tipo').value;
  const nota = Number(document.getElementById('f_nota').value);
  const retroalimentacion = document.getElementById('f_retro').value.trim();
  const archivoInput = document.getElementById('f_archivo');
  const maxNota = tipo === 'Recuperativa' ? 9 : 10;

  if(!tutor){ showToast('Escribe tu nombre.'); return; }
  if(!curso){ showToast('Selecciona un curso.'); return; }
  if(!modulo){ showToast('Selecciona un módulo.'); return; }
  if(!estudiante){ showToast('Selecciona un estudiante.'); return; }
  if(isNaN(nota) || nota<0 || nota>maxNota){ showToast(`La nota debe estar entre 0 y ${maxNota}.`); return; }
  if(!retroalimentacion){ showToast('La retroalimentación es obligatoria.'); return; }

  const btn = document.getElementById('btn_guardar');
  btn.disabled = true; btn.textContent = 'Guardando...';

  try{
    let archivo = null;
    if(archivoInput.files[0]){
      const f = archivoInput.files[0];
      archivo = {data: await fileToBase64(f), name: f.name, mimeType: f.type||'application/octet-stream'};
    }

    const res = await fetch(API_URL, {
      method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({
        action:'agregarCalificacion',
        data:{ fecha:new Date().toISOString().slice(0,10), curso, modulo, estudiante, tipo, nota, retroalimentacion, tutor, archivo }
      })
    });
    const json = await res.json();
    if(json.error) throw new Error(json.error);

    showToast(`Nota de ${estudiante} guardada.`);
    document.getElementById('f_estudiante').value = '';
    document.getElementById('f_nota').value = '';
    document.getElementById('f_retro').value = '';
    archivoInput.value = '';
  }catch(e){
    showToast('Error al guardar: '+e.message);
  }finally{
    btn.disabled = false; btn.textContent = 'Guardar Calificación';
  }
});
</script>
</body>
</html>
