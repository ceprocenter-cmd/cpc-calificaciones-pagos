<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Ceprocenter · Pre-Registro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #EEF0F5; --panel: #FFFFFF; --panel-2: #F5F6FA; --line: #DEE2EA;
    --accent: #7A9A1E; --accent-soft: rgba(122,154,30,0.14); --accent-dark: #62801A;
    --text: #24273A; --text-dim: #767C93;
    --danger: #D9614F; --radius: 12px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;-webkit-font-smoothing:antialiased;}
  h1,h2{font-family:'Quicksand',sans-serif;letter-spacing:0.01em;}
  .wrap{max-width:600px;margin:0 auto;padding:32px 20px 60px;}
  .top{text-align:center;margin-bottom:26px;}
  .top h1{font-size:24px;font-weight:700;margin:0;color:var(--text);}
  .top .sub{color:var(--text-dim);font-size:14px;margin-top:8px;line-height:1.5;}
  .accent{color:var(--accent-dark);}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:24px;box-shadow:0 1px 2px rgba(36,39,58,0.04);}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-dim);margin-bottom:6px;}
  .field .req{color:var(--danger);}
  .field input, .field select{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:12px;color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;}
  .field input:focus, .field select:focus{outline:none;border-color:var(--accent-dark);}
  .field .hint{font-size:12px;color:var(--text-dim);margin-top:5px;}
  .section-label{font-family:'Quicksand',sans-serif;font-weight:700;font-size:15px;color:var(--accent-dark);margin:28px 0 14px;padding-top:18px;border-top:1px solid var(--line);}
  .section-label:first-of-type{border-top:none;padding-top:0;margin-top:6px;}
  .btn{width:100%;font-family:'Quicksand',sans-serif;font-size:16px;font-weight:700;border-radius:10px;padding:14px;border:none;cursor:pointer;background:var(--accent);color:#fff;margin-top:8px;}
  .btn:hover{background:var(--accent-dark);}
  .btn:disabled{opacity:0.6;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;padding:12px 20px;border-radius:9px;font-size:13.5px;opacity:0;transition:all 0.25s ease;pointer-events:none;z-index:100;max-width:88%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .success-box{text-align:center;padding:50px 20px;}
  .success-box .icono{font-size:44px;margin-bottom:16px;}
  .success-box h2{font-size:20px;margin:0 0 10px;}
  .success-box p{color:var(--text-dim);font-size:14px;line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <img src="logo.png" alt="Ceprocenter" style="max-width:180px;margin:0 auto 16px;display:block;" onerror="this.style.display='none';">
    <h1>Pre-Registro <span class="accent">Ceprocenter</span></h1>
    <div class="sub">Completa tus datos para procesar tu matrícula.</div>
  </div>

  <div class="panel" id="form_box">
    <div class="section-label">Tu curso</div>
    <div class="field"><label>Curso o Diplomado al que te inscribes <span class="req">*</span></label><input id="f_curso" list="lista_cursos" placeholder="Escribe el nombre exacto que te indicó tu asesor"><datalist id="lista_cursos"></datalist></div>

    <div class="section-label">Tus datos</div>
    <div class="field"><label>Nombres y apellidos completos <span class="req">*</span></label><input id="f_estudiante" placeholder="Como aparece en tu cédula"></div>
    <div class="field"><label>Cédula <span class="req">*</span></label><input id="f_cedula" placeholder="Número de cédula"></div>
    <div class="field"><label>Correo electrónico <span class="req">*</span></label><input id="f_correo" type="email" placeholder="correo@ejemplo.com"></div>
    <div class="field"><label>Teléfono <span class="req">*</span></label><input id="f_telefono" placeholder="+593 ..."></div>
    <div class="field"><label>País <span class="req">*</span></label><input id="f_pais" placeholder="País"></div>
    <div class="field"><label>Ciudad <span class="req">*</span></label><input id="f_ciudad" placeholder="Ciudad"></div>
    <div class="field"><label>Profesión <span class="req">*</span></label><input id="f_profesion" placeholder="Profesión"></div>
    <div class="field"><label>Usuario de Instagram</label><input id="f_instagram" placeholder="@usuario"></div>
    <div class="field">
      <label>¿Cómo deseas que aparezca tu nombre en el certificado?</label>
      <input id="f_certificado" placeholder='Ej. "Lic. María Pérez", o solo tu nombre'>
      <div class="hint">Déjalo vacío si no aplica ningún título.</div>
    </div>
    <div class="field">
      <label>¿Quién te atendió?</label>
      <select id="f_asesor">
        <option value="">Selecciona una opción</option>
        <option value="Jose">Jose</option>
        <option value="Sara">Sara</option>
        <option value="Directo">No estoy seguro / Otro</option>
      </select>
    </div>

    <div class="section-label">Tus documentos</div>
    <div class="field"><label>Método de Pago <span class="req">*</span></label>
      <select id="f_metodo_pago">
        <option value="">Selecciona una opción</option>
        <option>Transferencia Bancaria</option><option>Depósito</option><option>Efectivo</option>
        <option>PayPal</option><option>Zelle</option><option>Binance</option><option>Pago Móvil</option>
        <option>Western Union/Zoom</option><option>Tarjeta de Crédito</option><option>Otro</option>
      </select>
    </div>
    <div class="field" id="f_cuenta_destino_wrap" style="display:none;"><label>¿A cuál cuenta transferiste/depositaste?</label>
      <select id="f_cuenta_destino">
        <option value="">Selecciona una opción</option>
        <option>Banco Pacífico</option>
        <option>Banco Pichincha</option>
        <option>Banco Guayaquil</option>
        <option>Otra</option>
      </select>
    </div>
    <div class="field"><label>N° de Referencia del Pago</label><input id="f_referencia_pago" placeholder="Número de comprobante o transacción"></div>
    <div class="field"><label>Comprobante de pago <span class="req">*</span></label><input id="f_file_comprobante" type="file" accept="image/*,.pdf"></div>
    <div class="field"><label>Foto de tu cédula</label><input id="f_file_cedula" type="file" accept="image/*,.pdf"></div>
    <div class="field"><label>Título o constancia de estudios (si aplica)</label><input id="f_file_titulo" type="file" accept="image/*,.pdf"></div>

    <div class="field" style="display:flex;align-items:flex-start;gap:10px;margin-top:24px;">
      <input type="checkbox" id="f_autorizo" style="width:20px;height:20px;margin-top:2px;flex-shrink:0;">
      <label for="f_autorizo" style="font-size:13px;font-weight:400;text-transform:none;letter-spacing:normal;color:var(--text);line-height:1.5;">
        Autorizo el uso de mis datos personales para fines administrativos y de comunicación relacionados con el curso. <span class="req">*</span>
      </label>
    </div>

    <button class="btn" id="btn_enviar">Enviar mis datos</button>
  </div>

  <div class="panel success-box" id="success_box" style="display:none;">
    <div class="icono">✅</div>
    <h2>¡Listo!</h2>
    <p>Ya recibimos tu información. En breve confirmamos tu matrícula y te contactamos por WhatsApp o correo.</p>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// Reemplaza esta URL una sola vez con la de tu Apps Script (la misma de tus otras herramientas).
const API_URL = 'https://script.google.com/macros/s/AKfycbzSocYjhrj1F0wvNecAnGeepxsP_jie58658PL-jnQXtiVqqAT7283HpXWRs7HOWkNJ/exec';

function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3600); }

async function apiGet(sheet){
  const res = await fetch(`${API_URL}?sheet=${sheet}`);
  return await res.json();
}
function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function cargarCursos(){
  try{
    const mod = await apiGet('Modulos');
    const cursos = [...new Set(mod.map(m=>m.curso).filter(Boolean))].sort();
    document.getElementById('lista_cursos').innerHTML = cursos.map(c=>`<option value="${c}">`).join('');
  }catch(e){ /* silencioso: si falla, el cliente igual puede escribir el curso a mano */ }
}
cargarCursos();

document.getElementById('f_metodo_pago').addEventListener('change', ()=>{
  const metodo = document.getElementById('f_metodo_pago').value;
  const requiereCuenta = metodo === 'Transferencia Bancaria' || metodo === 'Depósito';
  document.getElementById('f_cuenta_destino_wrap').style.display = requiereCuenta ? 'block' : 'none';
});

document.getElementById('btn_enviar').addEventListener('click', async ()=>{
  const curso = document.getElementById('f_curso').value.trim();
  const estudiante = document.getElementById('f_estudiante').value.trim();
  const cedula = document.getElementById('f_cedula').value.trim();
  const correo = document.getElementById('f_correo').value.trim();
  const telefono = document.getElementById('f_telefono').value.trim();
  const pais = document.getElementById('f_pais').value.trim();
  const ciudad = document.getElementById('f_ciudad').value.trim();
  const profesion = document.getElementById('f_profesion').value.trim();
  const instagram = document.getElementById('f_instagram').value.trim();
  const certificado = document.getElementById('f_certificado').value.trim();
  const asesorMencionado = document.getElementById('f_asesor').value;
  const metodoPago = document.getElementById('f_metodo_pago').value;
  const cuentaDestino = document.getElementById('f_cuenta_destino_wrap').style.display !== 'none' ? document.getElementById('f_cuenta_destino').value : '';
  const referenciaPago = document.getElementById('f_referencia_pago').value.trim();

  if(!curso || !estudiante || !cedula || !correo || !telefono || !pais || !ciudad || !profesion){
    showToast('Por favor completa todos los campos marcados con *.');
    return;
  }
  if(!asesorMencionado){ showToast('Selecciona quién te atendió.'); return; }
  if(!metodoPago){ showToast('Selecciona tu método de pago.'); return; }
  if((metodoPago==='Transferencia Bancaria'||metodoPago==='Depósito') && !cuentaDestino){
    showToast('Selecciona a cuál cuenta transferiste o depositaste.'); return;
  }
  if(!document.getElementById('f_autorizo').checked){
    showToast('Debes autorizar el uso de tus datos personales para continuar.');
    return;
  }

  const fileComprobante = document.getElementById('f_file_comprobante').files[0];
  if(!fileComprobante){ showToast('El comprobante de pago es obligatorio.'); return; }
  const fileCedula = document.getElementById('f_file_cedula').files[0];
  const fileTitulo = document.getElementById('f_file_titulo').files[0];

  const btn = document.getElementById('btn_enviar');
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  try{
    const archivos = {};
    archivos.comprobante = {data: await fileToBase64(fileComprobante), name: fileComprobante.name, mimeType: fileComprobante.type||'application/octet-stream'};
    if(fileCedula) archivos.cedulaDoc = {data: await fileToBase64(fileCedula), name: fileCedula.name, mimeType: fileCedula.type||'application/octet-stream'};
    if(fileTitulo) archivos.titulo = {data: await fileToBase64(fileTitulo), name: fileTitulo.name, mimeType: fileTitulo.type||'application/octet-stream'};

    const res = await fetch(API_URL, {
      method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({
        action:'crearSolicitud',
        data:{ curso, estudiante, cedula, correo, telefono, pais, ciudad, profesion, instagram, certificado, asesorMencionado, metodoPago, cuentaDestino, referenciaPago, autorizoDatos: true, archivos }
      })
    });
    const json = await res.json();
    if(json.error) throw new Error(json.error);

    document.getElementById('form_box').style.display = 'none';
    document.getElementById('success_box').style.display = 'block';
  }catch(e){
    showToast('Hubo un problema al enviar: '+e.message+'. Inténtalo de nuevo.');
    btn.disabled = false;
    btn.textContent = 'Enviar mis datos';
  }
});
</script>
</body>
</html>
